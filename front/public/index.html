<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CMS Documentation - Front Public</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Fira+Code&display=swap" />
    <link rel="stylesheet" href="./main.css" />
  </head>
  <body>
    <header class="navbar" role="banner">
      <div class="container public-nav">
        <div class="navbar__brand">Docs Entreprise</div>
        <a class="btn btn--outline btn--sm" href="http://localhost:5174/#/login">Backoffice</a>
      </div>
    </header>

    <main class="container public-page" role="main" aria-label="Contenu principal">
      <section class="public-page__hero card" aria-labelledby="public-title">
        <div class="card__body">
          <p class="public-page__eyebrow">Headless CMS</p>
          <h1 id="public-title" class="public-page__title">Documentation publique</h1>
          <p class="public-page__subtitle">Explore les articles publies depuis l'API, avec un rendu propre et responsive.</p>
        </div>
      </section>

      <section class="public-page__list" aria-labelledby="docs-title">
        <div class="public-page__list-header">
          <h2 id="docs-title" class="m-0">Derniers documents</h2>
          <span class="badge badge--info">Public API</span>
        </div>
        <div id="status" class="alert alert--info" role="status" aria-live="polite">Chargement...</div>
        <div id="docs-grid" class="grid grid--3" aria-live="polite"></div>
      </section>
    </main>

    <footer class="footer" role="contentinfo">
      <div class="container">CMS headless - Front public documentation</div>
    </footer>

    <script src="./app.js" defer></script>
  </body>
</html>
