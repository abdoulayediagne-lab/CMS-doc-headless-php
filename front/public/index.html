<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CMS Documentation - Front Public</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Fira+Code&display=swap" />
    <link rel="stylesheet" href="./main.css" />
  </head>
  <body>
    <header class="navbar" role="banner">
      <div class="container">
        <div class="navbar__brand">Docs Entreprise</div>
      </div>
    </header>

    <main class="container home" role="main" aria-label="Contenu principal" style="padding-top: 1.5rem; padding-bottom: 2rem;">
      <section class="home__hero" aria-labelledby="public-title" style="padding: 1rem; margin-bottom: 1rem;">
        <h1 id="public-title" class="home__title">Documentation publique</h1>
        <p class="home__subtitle">Articles publies depuis l'API headless.</p>
      </section>

      <section aria-labelledby="docs-title">
        <h2 id="docs-title">Derniers documents</h2>
        <div id="status" class="alert alert--info" role="status" aria-live="polite">Chargement...</div>
        <div id="docs-grid" class="grid grid--3" aria-live="polite"></div>
      </section>
    </main>

    <footer class="footer" role="contentinfo">
      <div class="container">CMS headless - Front public</div>
    </footer>

    <script src="./app.js" defer></script>
  </body>
</html>
